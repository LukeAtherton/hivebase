services:
  postgres:
    image: postgres:16
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm_dev
      POSTGRES_DB: swarm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U swarm']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
